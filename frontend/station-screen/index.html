<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>CCEC 工位倒计时屏</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{margin:0;font-family:Arial,"Microsoft YaHei",sans-serif;background:#111;color:#fff}
    .wrap{min-height:100vh;display:grid;grid-template-columns:1.2fr .8fr;gap:2vw;padding:2vw}
    .hero,.guide{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:1.5vw}
    .hero{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2vw}
    .guide{padding:1.4vw 1.6vw;overflow:auto}
    .station{font-size:5vw;font-weight:700}
    .timer{font-size:12vw;font-weight:900;letter-spacing:.04em;line-height:1}
    .meta{font-size:2.1vw;opacity:.9;margin-top:1vh}
    .status{margin-top:2vh;padding:1vh 3vw;border-radius:2vw;background:#444;font-size:2.2vw;border:3px solid transparent}
    .status.flash-red{animation:ccecFlashRed 1s ease-in-out infinite}
    @keyframes ccecFlashRed{0%,100%{opacity:1}50%{opacity:0.45}}
    .hint{font-size:1.4vw;margin-top:2vh;opacity:.55}
    .guide h2{margin:0;font-size:2.1vw}
    .guide-meta{margin:.8vh 0 1.4vh;color:#b9c2cf;font-size:1.1vw}
    .guide-section{margin-top:1.2vw}
    .guide-section h3{margin:0 0 .6vw;font-size:1.2vw;color:#7ee787}
    .guide-list{margin:0;padding-left:1.4em;white-space:pre-wrap;font-size:1.1vw;line-height:1.7}
    .guide-empty{font-size:1.2vw;opacity:.7;padding-top:2vh}
    .hidden{display:none}
    @media (max-width: 1200px){
      .wrap{grid-template-columns:1fr;}
      .station{font-size:10vw}.timer{font-size:18vw}.meta{font-size:4vw}.status{font-size:4vw}.hint{font-size:2.4vw}
      .guide h2{font-size:5vw}.guide-meta,.guide-list,.guide-empty,.guide-section h3{font-size:3vw}
    }
  </style>
</head>
<body>
<div class="wrap">
  <section class="hero">
    <div class="station" id="station">A601</div>
    <div class="timer" id="timer">--:--</div>
    <div class="meta" id="meta">等待工位数据</div>
    <div class="status" id="status">CONNECTING</div>
    <div class="hint" id="hint"></div>
  </section>
  <aside class="guide">
    <h2 id="guide-title">作业指导书加载中</h2>
    <div class="guide-meta" id="guide-meta">—</div>
    <div class="guide-section">
      <h3>作业步骤</h3>
      <div class="guide-list" id="guide-content">正在获取指导书内容…</div>
    </div>
    <div class="guide-section">
      <h3>安全注意事项</h3>
      <div class="guide-list" id="guide-safety">—</div>
    </div>
    <div class="guide-empty hidden" id="guide-empty">当前工位暂无启用中的作业指导书</div>
  </aside>
</div>
<script>
const params = new URLSearchParams(location.search);
const station = params.get('station') || 'A601';
document.getElementById('station').textContent = station;
const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
const url = `${wsProto}//${location.host}/ws/station/${station}`;
let ws;
let reconnectDelayMs = 1000;
const maxDelayMs = 30000;

function normalizeWsPayload(raw) {
  if (raw && raw.type === 'STATE_UPDATE') return raw;
  return raw;
}

function applySnapshot(raw) {
  const data = normalizeWsPayload(raw);
  const remain = Number(data.remain != null ? data.remain : 0);
  let timerText;
  if (remain < 0) {
    const sec = Math.abs(remain);
    const m = String(Math.floor(sec / 60)).padStart(2, '0');
    const s = String(sec % 60).padStart(2, '0');
    timerText = `+${m}:${s}`;
  } else {
    const m = String(Math.floor(remain / 60)).padStart(2, '0');
    const s = String(remain % 60).padStart(2, '0');
    timerText = `${m}:${s}`;
  }
  document.getElementById('timer').textContent = timerText;
  const so = data.soNo != null && data.soNo !== '' ? data.soNo : (data.so || '-');
  const esn = data.esnNo != null && data.esnNo !== '' ? data.esnNo : (data.esn || '-');
  const engine = data.engineType || '-';
  document.getElementById('meta').textContent = `${so} / ${esn} / ${engine}`;
  const st = document.getElementById('status');
  const statusText = data.state != null && data.state !== '' ? data.state : (data.status || 'UNKNOWN');
  st.textContent = statusText;
  const colorMap = { GREEN: '#1a3d1a', YELLOW: '#4d4000', RED: '#4d1515', RED_FLASH: '#4d1515', BLUE: '#152a4d', PURPLE: '#301540', GRAY: '#333' };
  const col = data.color || 'GRAY';
  st.style.background = colorMap[col] || '#333';
  st.classList.toggle('flash-red', col === 'RED_FLASH');
  st.style.borderColor = col === 'GREEN' ? '#3fb950' : col === 'YELLOW' ? '#d29922' : (col === 'RED' || col === 'RED_FLASH') ? '#f85149' : 'transparent';
}

function setHint(msg) {
  document.getElementById('hint').textContent = msg || '';
}

function setGuideEmpty(visible) {
  document.getElementById('guide-empty').classList.toggle('hidden', !visible);
}

async function loadGuide() {
  try {
    const res = await fetch(`/api/v1/public/stations/${encodeURIComponent(station)}/work-instruction`);
    if (!res.ok) {
      throw new Error('not_found');
    }
    const body = await res.json();
    const data = body.data || {};
    document.getElementById('guide-title').textContent = data.title || '未命名指导书';
    document.getElementById('guide-meta').textContent = `${data.docNo || '-'} / ${data.versionNo || '-'} / ${data.stationCode || station}`;
    document.getElementById('guide-content').textContent = data.contentText || '暂无步骤';
    document.getElementById('guide-safety').textContent = data.safetyNotes || '—';
    setGuideEmpty(false);
  } catch (e) {
    document.getElementById('guide-title').textContent = '暂无作业指导书';
    document.getElementById('guide-meta').textContent = station;
    document.getElementById('guide-content').textContent = '请在管理平台维护并启用该工位的指导书。';
    document.getElementById('guide-safety').textContent = '—';
    setGuideEmpty(true);
  }
}

function connect() {
  setHint('正在连接 WebSocket…');
  ws = new WebSocket(url);
  ws.onopen = () => {
    reconnectDelayMs = 1000;
    setHint('');
    document.getElementById('status').textContent = 'WAIT_DATA';
  };
  ws.onmessage = (event) => {
    try {
      applySnapshot(JSON.parse(event.data));
    } catch (e) {
      /* ignore */
    }
  };
  ws.onclose = () => {
    document.getElementById('status').textContent = 'OFFLINE';
    setHint(`${reconnectDelayMs / 1000}s 后重连`);
    setTimeout(() => {
      reconnectDelayMs = Math.min(maxDelayMs, reconnectDelayMs * 2);
      connect();
    }, reconnectDelayMs);
  };
  ws.onerror = () => {
    try { ws.close(); } catch (e) {}
  };
}
loadGuide();
connect();
</script>
</body>
</html>
