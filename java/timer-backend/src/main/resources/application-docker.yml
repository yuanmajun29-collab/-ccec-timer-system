server:
  port: 8080

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@//oracle:1521/FREEPDB1}
    username: ${SPRING_DATASOURCE_USERNAME:CCEC_TIMER}
    password: ${SPRING_DATASOURCE_PASSWORD:CCEC_TIMER_123}
    driver-class-name: oracle.jdbc.OracleDriver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:redis}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

timer:
  websocket:
    heartbeatSeconds: 30
  ct:
    defaultSeconds: 300
  mqtt:
    enabled: ${TIMER_MQTT_ENABLED:true}
    broker-uri: ${TIMER_MQTT_BROKER_URI:tcp://mosquitto:1883}
    username: ${TIMER_MQTT_USERNAME:}
    password: ${TIMER_MQTT_PASSWORD:}
    topic-prefix: ${TIMER_MQTT_TOPIC_PREFIX:ccec/station}
    qos: 1
    retained: true
