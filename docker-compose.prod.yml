services:
  redis:
    logging: &json_logging
      driver: json-file
      options:
        max-size: "100m"
        max-file: "10"

  oracle:
    logging: *json_logging

  timer-backend:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-yuanmajun29-collab/ccec-timer-system}/timer-backend:${IMAGE_TAG:-latest}
    build:
      context: ./java/timer-backend
    environment:
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus,metrics"
      MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/readiness | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 60s
    logging: *json_logging
    deploy:
      resources:
        limits:
          memory: 1024m
        reservations:
          memory: 512m

  plc-collector:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-yuanmajun29-collab/ccec-timer-system}/plc-collector:${IMAGE_TAG:-latest}
    build:
      context: ./cpp/plc-collector
    logging: *json_logging
    deploy:
      resources:
        limits:
          memory: 256m
        reservations:
          memory: 128m

  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/ccec-timer.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/station-screen:/usr/share/nginx/html:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    logging: *json_logging

  redis-exporter:
    image: oliver006/redis_exporter:v1.67.0
    container_name: ccec-redis-exporter
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging: *json_logging

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: ccec-node-exporter
    command:
      - --path.rootfs=/host
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    logging: *json_logging

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: ccec-cadvisor
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    logging: *json_logging

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: ccec-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/monitoring/prometheus/rules.yml:/etc/prometheus/rules.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - timer-backend
      - redis-exporter
      - node-exporter
      - cadvisor
    restart: unless-stopped
    logging: *json_logging

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: ccec-alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./deploy/monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    restart: unless-stopped
    logging: *json_logging

  loki:
    image: grafana/loki:3.2.0
    container_name: ccec-loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./deploy/monitoring/loki/loki.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    restart: unless-stopped
    logging: *json_logging

  promtail:
    image: grafana/promtail:3.2.0
    container_name: ccec-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./deploy/monitoring/promtail/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: unless-stopped
    logging: *json_logging

  grafana:
    image: grafana/grafana:11.2.0
    container_name: ccec-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-ChangeMe_Grafana_123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./deploy/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./deploy/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./deploy/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    logging: *json_logging

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
