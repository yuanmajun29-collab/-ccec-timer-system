server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /admin {
        return 302 /admin/index.html;
    }
    location = /admin/ {
        return 302 /admin/index.html;
    }

    # 运营管理控制台（静态页；接口 /api/v1/management/* 需登录会话）
    location /admin/ {
        alias /usr/share/nginx/admin/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://timer-backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /actuator/ {
        proxy_pass http://timer-backend:8080/actuator/;
    }

    location /ws/ {
        proxy_pass http://timer-backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 3600s;
    }
}
