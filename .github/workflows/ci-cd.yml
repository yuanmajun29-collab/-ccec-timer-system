# CI：PR / 任意分支 push 时跑测试与镜像构建；push main 时推送 GHCR。
# CD：push main 后是否 SSH 部署由仓库变量 ENABLE_SSH_DEPLOY 控制（Settings → Variables → Actions，设为 true）。
# 同时需在 Secrets 中配置 PROD_HOST、PROD_USER、PROD_SSH_KEY；可选 PROD_SSH_PORT。未设变量时跳过部署，仅构建推送镜像。
# 环境 production：Settings → Environments → production（可加固保护分支与审批人）。

name: CI/CD

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  android-kiosk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Assemble station-kiosk (Debug)
        working-directory: android/station-kiosk
        run: chmod +x gradlew && ./gradlew :app:assembleDebug --no-daemon --stacktrace

  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
          echo "docker compose config OK (base + prod merge)"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java backend
        working-directory: java/timer-backend
        run: |
          if [ -f mvnw ]; then ./mvnw -B test package; else mvn -B test package; fi

      - name: Build C++ collector image
        run: docker build -t ccec-plc-collector:test ./cpp/plc-collector

      - name: Build backend image
        run: docker build -t ccec-timer-backend:test ./java/timer-backend

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata backend
        if: github.event_name != 'pull_request'
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/timer-backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Docker metadata collector
        if: github.event_name != 'pull_request'
        id: meta_collector
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/plc-collector
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./java/timer-backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Push collector image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./cpp/plc-collector
          push: true
          tags: ${{ steps.meta_collector.outputs.tags }}
          labels: ${{ steps.meta_collector.outputs.labels }}

  deploy:
    needs: [build-test, android-kiosk]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_SSH_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy by SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT || 22 }}
          script: |
            set -e
            cd /opt/ccec-timer/ccec-timer-system
            git pull --ff-only
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            export IMAGE_TAG=latest
            ./deploy/scripts/prod-up.sh
